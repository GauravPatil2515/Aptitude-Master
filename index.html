<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AptitudeMaster — Placement Prep Platform</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='12' y='12' width='76' height='76' rx='16' fill='%235ba6a6'/><text x='50' y='66' font-size='46' font-family='sans-serif' font-weight='bold' fill='white' text-anchor='middle'>A</text></svg>">

  <!-- SEO -->
  <meta name="description" content="AptitudeMaster — Aptitude, DSA, SQL, Core CS & ML prep for campus placements. With AI tutor, practice quizzes, and cheat sheets.">
  <meta name="keywords" content="aptitude, placement prep, TCS, Infosys, DSA, SQL, campus placement, AI tutor">
  <meta property="og:title" content="AptitudeMaster">
  <meta property="og:description" content="Your all-in-one placement prep platform.">

  <!-- Design System -->
  <link rel="stylesheet" href="style/tokens.css">
  <link rel="stylesheet" href="style/layout.css">
  <link rel="stylesheet" href="style/components.css">
  <link rel="stylesheet" href="style/pages.css">
  <link rel="stylesheet" href="style/themes.css">
  <link rel="stylesheet" href="style/utilities.css">
  <link rel="stylesheet" href="style/trackers.css">
  <link rel="stylesheet" href="style/playground-ai.css">

  <!-- marked.js for Markdown rendering (pinned + SRI for integrity) -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"
          integrity="sha384-NNQgBjjuhtXzPmmy4gurS5X7P4uTt1DThyevz4Ua0IVK5+kazYQI1W27JHjbbxQz"
          crossorigin="anonymous"></script>

  <!-- Monaco Editor (lazy-loaded by playground page) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs/loader.min.js" defer></script>
</head>
<body>
  <div id="app-layout" class="app-layout">

    <!-- ═══ SIDEBAR ═══ -->
    <aside id="sidebar" class="sidebar" role="navigation" aria-label="Main navigation">
      <!-- Rendered by components/sidebar.js -->
    </aside>

    <!-- ═══ MAIN WORKSPACE ═══ -->
    <div class="main-wrapper">

      <!-- Top Bar -->
      <header id="topbar" class="topbar" role="banner">
        <!-- Rendered by components/topbar.js -->
      </header>

      <!-- Page Content Mount Point -->
      <main id="page-content" class="page-content" role="main" aria-live="polite">
        <!-- All page content rendered here by router -->
        <div class="page-loading">Loading AptitudeMaster…</div>
      </main>

    </div>
  </div>

  <!-- Mobile Bottom Nav -->
  <nav class="mobile-bottom-nav" role="navigation" aria-label="Mobile navigation">
    <a href="#/home"              class="mobile-nav-item" data-route="home">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12L12 3l9 9M5 10v9a1 1 0 001 1h4v-4h4v4h4a1 1 0 001-1v-9"/></svg>
      <span>Home</span>
    </a>
    <a href="#/subject/aptitude" class="mobile-nav-item" data-route="aptitude">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
      <span>Aptitude</span>
    </a>
    <a href="#/dsa"              class="mobile-nav-item" data-route="dsa">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/></svg>
      <span>DSA</span>
    </a>
    <a href="#/subject/sql"      class="mobile-nav-item" data-route="sql">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16M4 12h16M4 17h7"/></svg>
      <span>SQL</span>
    </a>
    <a href="#/ai-tutor"         class="mobile-nav-item" data-route="ai-tutor">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
      <span>AI</span>
    </a>
  </nav>

  <!-- Bootstrap: init router, sidebar, topbar -->
  <script type="module">
    import Router           from './router.js';
    import { renderSidebar } from './components/sidebar.js';
    import { renderTopbar }  from './components/topbar.js';
    import { initSettings }  from './components/settings.js';
    import { initRipple }    from './modules/ui-ripple.js';
    import { store }         from './state/store.js';

    // Restore theme (default is dark; explicit light/dark both honored)
    const theme = store.get().theme;
    if (theme === 'light') {
      document.body.classList.add('light-theme');
    } else if (theme === 'dark') {
      document.body.classList.add('dark-forced');
    }

    // Update streak on load
    store.updateStreak();

    // NOTE: No API key is hard-coded here. The AI Tutor reads the user's
    // Groq key from localStorage (set via the Settings panel) or, in
    // production, proxies through /api/groq (Vercel Edge) using the
    // server-side GROQ_API_KEY env var. See api/ai.js and api/groq.js.

    // Mount persistent UI
    renderSidebar();
    renderTopbar();
    initSettings();
    initRipple();

    // Re-render sidebar on every route change to update active states
    window.addEventListener('hashchange', () => {
      renderSidebar();
      // Update mobile nav active state
      const path = window.location.hash.replace('#/', '');
      document.querySelectorAll('.mobile-nav-item').forEach(el => {
        el.classList.toggle('mobile-nav-item--active', path.startsWith(el.dataset.route || '__none__'));
      });
    });

    // Start router
    Router.init();
  </script>
</body>
</html>
